<!DOCTYPE html>
<html>
<head>
    <title>MindSpace - Teen Wellness</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MindSpace Wellness</h1>
    
    <div class="breathing-container">
        <div class="breathing-circle"></div>
    </div>
    <button id="breath-btn" onclick="toggleBreathing()">Start Breathing Exercise</button>

    <hr>
    <h3>How are you feeling today?</h3>
    <button onclick="logMood('Happy')">😊 Happy</button>
    <button onclick="logMood('Stressed')">😰 Stressed</button>
    <button onclick="logMood('Calm')">😌 Calm</button>
    
    <p id="mood-display">Select a mood to track it!</p>

    <script src="script.js"></script>
</body>
</html>

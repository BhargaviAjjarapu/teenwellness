<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpace | Teen Wellness</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>MindSpace</h1>
        <p>Your mental health companion.</p>

        <div class="section">
            <h2>Breathing Exercise</h2>
            <div class="breathing-container">
                <div class="circle" id="breath-circle"></div>
            </div>
            <button onclick="toggleBreathing()" id="breath-btn">Start Breathing</button>
        </div>

        <div class="section">
            <h2>Mood Tracker</h2>
            <p>How are you feeling right now?</p>
            <div class="mood-buttons">
                <button onclick="logMood('Happy', '😊')">😊 Happy</button>
                <button onclick="logMood('Stressed', '😰')">😰 Stressed</button>
                <button onclick="logMood('Calm', '😌')">😌 Calm</button>
                <button onclick="logMood('Tired', '😴')">😴 Tired</button>
            </div>
            <p id="mood-status">No mood tracked yet today.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpace Pro | Wellness</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>MindSpace</h1>
            <p>Your Daily Wellness Hub</p>
        </header>

        <section class="card">
            <h3>Mood Tracker</h3>
            <div class="mood-options">
                <button onclick="addMood(5)">😊</button>
                <button onclick="addMood(4)">🙂</button>
                <button onclick="addMood(3)">😐</button>
                <button onclick="addMood(2)">😔</button>
                <button onclick="addMood(1)">😫</button>
            </div>
            <canvas id="moodChart"></canvas>
        </section>

        <section class="card">
            <h3>Square Breathing</h3>
            <p id="breath-text">Click start to begin</p>
            <div class="breathing-box">
                <div id="breath-circle" class="circle"></div>
            </div>
            <button onclick="startBreathing()">Start Exercise</button>
        </section>

        <section class="card">
            <h3>Focus Timer</h3>
            <div class="timer-display" id="timer">25:00</div>
            <p id="timer-label">Work Session</p>
            <button onclick="toggleTimer()" id="timer-btn">Start Timer</button>
        </section>

        <section class="card">
            <h3>Vent Box</h3>
            <textarea id="ventInput" placeholder="Dump your thoughts here... (Private)"></textarea>
            <button onclick="clearVent()">Clear Space</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
